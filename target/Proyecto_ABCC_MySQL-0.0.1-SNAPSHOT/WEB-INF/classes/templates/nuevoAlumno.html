<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Alumno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Agregar Alumno</h2>
        <hr>
        <form th:action="@{/guardarAlumno}" th:object="${alumno}" method="POST">
            <div class="mb-3">
                <label>Número de Control</label>
                <input type="text" th:field="*{numControl}" class="form-control">
            </div>
            <div class="mb-3">
                <label>Nombre</label>
                <input type="text" th:field="*{nombre}" class="form-control">
            </div>
            <div class="mb-3">
                <label>Primer Apellido</label>
                <input type="text" th:field="*{primerAp}" class="form-control">
            </div>
            <div class="mb-3">
                <label>Segundo Apellido</label>
                <input type="text" th:field="*{segundoAp}" class="form-control">
            </div>
            <div class="mb-3">
                <label>Fecha de Nacimiento</label>
                <input type="date" th:field="*{fechaNac}" class="form-control">
            </div>
            <div class="mb-3">
                <label>Semestre</label>
                <input type="number" th:field="*{semestre}" class="form-control">
            </div>
            <div class="mb-3">
                <label>Carrera</label>
                <input type="text" th:field="*{carrera}" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a th:href="@{/}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>

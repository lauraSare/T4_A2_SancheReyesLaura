<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ver Materia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        h1 { color: #dc3545; font-weight: bold; text-align: center; margin: 30px 0; }
    </style>
</head>
<body>
    <h1>Servicios Escolares</h1>
    <div class="container">
        <div class="mb-3">
            <a th:href="@{/materias}" class="btn btn-secondary btn-sm">← Regresar</a>
        </div>
        <div class="card">
            <div class="card-header">Detalle de Materia</div>
            <div class="card-body">
                <p><strong>Clave:</strong> <span th:text="${materia.clave}"></span></p>
                <p><strong>Nombre:</strong> <span th:text="${materia.nombre}"></span></p>
                <p><strong>Docente:</strong> <span th:text="${materia.docente}"></span></p>
                <p><strong>Créditos:</strong> <span th:text="${materia.creditos}"></span></p>
                <p><strong>Semestre:</strong> <span th:text="${materia.semestre}"></span></p>
                <a th:href="@{/materias/editar/{id}(id=${materia.id})}" class="btn btn-warning">Editar</a>
                <a th:href="@{/materias}" class="btn btn-secondary">Regresar</a>
            </div>
        </div>
    </div>
</body>
</html>

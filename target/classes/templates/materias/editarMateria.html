<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Materia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        h1 { color: #dc3545; font-weight: bold; text-align: center; margin: 30px 0; }
    </style>
</head>
<body>
    <h1>Servicios Escolares</h1>
    <div class="container">
        <div class="mb-3">
            <a th:href="@{/materias}" class="btn btn-secondary btn-sm">← Regresar</a>
        </div>
        <div class="card">
            <div class="card-header">Editar Materia</div>
            <div class="card-body">
                <form th:action="@{/materias/actualizar/{id}(id=${materia.id})}" th:object="${materia}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Clave</label>
                        <input type="text" th:field="*{clave}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" th:field="*{nombre}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Docente</label>
                        <input type="text" th:field="*{docente}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Créditos</label>
                        <input type="number" th:field="*{creditos}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Semestre</label>
                        <input type="text" th:field="*{semestre}" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-warning">Actualizar</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

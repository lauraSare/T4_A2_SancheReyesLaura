<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle Alumno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Detalle del Alumno</h2>
        <hr>
        <table class="table table-bordered w-50">
            <tr><th>Núm. Control</th><td th:text="${alumno.numControl}"></td></tr>
            <tr><th>Nombre</th><td th:text="${alumno.nombre}"></td></tr>
            <tr><th>Primer Apellido</th><td th:text="${alumno.primerAp}"></td></tr>
            <tr><th>Segundo Apellido</th><td th:text="${alumno.segundoAp}"></td></tr>
            <tr><th>Fecha de Nacimiento</th><td th:text="${alumno.fechaNac}"></td></tr>
            <tr><th>Semestre</th><td th:text="${alumno.semestre}"></td></tr>
            <tr><th>Carrera</th><td th:text="${alumno.carrera}"></td></tr>
        </table>
        <a th:href="@{/}" class="btn btn-secondary">Regresar</a>
    </div>
</body>
</html>

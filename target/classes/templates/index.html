<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios Escolares</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        h1 {
            color: #dc3545;
            font-weight: bold;
            text-align: center;
            margin: 30px 0;
        }
    </style>
</head>
<body>

    <h1>Servicios Escolares</h1>

    <div class="container d-flex justify-content-end mb-2">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-danger btn-sm">Cerrar Sesión</button>
        </form>
    </div>

    <div class="container">
        <div class="mb-3 d-flex gap-2">
            <a th:href="@{/}" class="btn btn-outline-danger">Alumnos</a>
            <a th:href="@{/materias}" class="btn btn-outline-danger">Materias</a>
            <a th:href="@{/actividades}" class="btn btn-outline-danger">Actividades Extraescolares</a>
        </div>
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>Listado de Alumnos</span>
                <a th:href="@{/nuevoAlumno}" class="btn btn-primary">AGREGAR</a>
            </div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Num. Control</th>
                            <th>Nombre</th>
                            <th>Primer Ap.</th>
                            <th>Segundo Ap.</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="a : ${alumnos}">
                            <td th:text="${a.numControl}"></td>
                            <td th:text="${a.nombre}"></td>
                            <td th:text="${a.primerAp}"></td>
                            <td th:text="${a.segundoAp}"></td>
                            <td>
                                <a th:href="@{/ver/{id}(id=${a.id})}" class="btn btn-info btn-sm">Ver</a>
                                <a th:href="@{/editar/{id}(id=${a.id})}" class="btn btn-warning btn-sm">Editar</a>
                                <a th:href="@{/eliminar/{id}(id=${a.id})}" class="btn btn-danger btn-sm">Eliminar</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>

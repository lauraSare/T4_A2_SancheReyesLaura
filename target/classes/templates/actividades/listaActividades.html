<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Actividades Extraescolares</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        h1 { color: #dc3545; font-weight: bold; text-align: center; margin: 30px 0; }
    </style>
</head>
<body>
    <h1>Servicios Escolares</h1>
    <div class="container d-flex justify-content-end mb-2">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-danger btn-sm">Cerrar Sesión</button>
        </form>
    </div>
    <div class="container">
        <div class="mb-3">
            <a th:href="@{/}" class="btn btn-secondary btn-sm">← Inicio</a>
        </div>
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>Listado de Actividades Extraescolares</span>
                <a th:href="@{/actividades/nueva}" class="btn btn-primary">AGREGAR</a>
            </div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Responsable</th>
                            <th>Lugar</th>
                            <th>Fecha</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="a : ${actividades}">
                            <td th:text="${a.nombre}"></td>
                            <td th:text="${a.descripcion}"></td>
                            <td th:text="${a.responsable}"></td>
                            <td th:text="${a.lugar}"></td>
                            <td th:text="${a.fecha}"></td>
                            <td>
                                <a th:href="@{/actividades/ver/{id}(id=${a.id})}" class="btn btn-info btn-sm">Ver</a>
                                <a th:href="@{/actividades/editar/{id}(id=${a.id})}" class="btn btn-warning btn-sm">Editar</a>
                                <a th:href="@{/actividades/eliminar/{id}(id=${a.id})}" class="btn btn-danger btn-sm">Eliminar</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ver Actividad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        h1 { color: #dc3545; font-weight: bold; text-align: center; margin: 30px 0; }
    </style>
</head>
<body>
    <h1>Servicios Escolares</h1>
    <div class="container">
        <div class="mb-3">
            <a th:href="@{/actividades}" class="btn btn-secondary btn-sm">← Regresar</a>
        </div>
        <div class="card">
            <div class="card-header">Detalle de Actividad Extraescolar</div>
            <div class="card-body">
                <p><strong>Nombre:</strong> <span th:text="${actividad.nombre}"></span></p>
                <p><strong>Descripción:</strong> <span th:text="${actividad.descripcion}"></span></p>
                <p><strong>Responsable:</strong> <span th:text="${actividad.responsable}"></span></p>
                <p><strong>Lugar:</strong> <span th:text="${actividad.lugar}"></span></p>
                <p><strong>Fecha:</strong> <span th:text="${actividad.fecha}"></span></p>
                <a th:href="@{/actividades/editar/{id}(id=${actividad.id})}" class="btn btn-warning">Editar</a>
                <a th:href="@{/actividades}" class="btn btn-secondary">Regresar</a>
            </div>
        </div>
    </div>
</body>
</html>

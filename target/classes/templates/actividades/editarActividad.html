<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Actividad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        h1 { color: #dc3545; font-weight: bold; text-align: center; margin: 30px 0; }
    </style>
</head>
<body>
    <h1>Servicios Escolares</h1>
    <div class="container">
        <div class="mb-3">
            <a th:href="@{/actividades}" class="btn btn-secondary btn-sm">← Regresar</a>
        </div>
        <div class="card">
            <div class="card-header">Editar Actividad Extraescolar</div>
            <div class="card-body">
                <form th:action="@{/actividades/actualizar/{id}(id=${actividad.id})}" th:object="${actividad}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" th:field="*{nombre}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <input type="text" th:field="*{descripcion}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Responsable</label>
                        <input type="text" th:field="*{responsable}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Lugar</label>
                        <input type="text" th:field="*{lugar}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Fecha</label>
                        <input type="date" th:field="*{fecha}" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-warning">Actualizar</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
